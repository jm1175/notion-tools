<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Chord Tool</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #191919;
      }
    }
    iframe {
      width: 360px;
      height: 560px;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <iframe
    src="https://guitarapp.com/chords/embedtool?theme=system"
    title="Online Chord Tool">
  </iframe>
</body>
</html>
