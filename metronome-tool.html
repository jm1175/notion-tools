<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Metronome</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }
    html, body {
      width: 100%;
      height: 100%;
      background-color: #ffffff;
      display: flex;
      justify-content: center;
      align-items: flex-start;
    }
    @media (prefers-color-scheme: dark) {
      html, body {
        background-color: #191919;
      }
    }
    iframe {
      width: 360px;
      height: 560px;
      border: none;
      border-radius: 4px;
    }
  </style>
</head>
<body>
  <iframe id="metronome-frame" title="Metronome"></iframe>
  <script>
    const theme = window.matchMedia('(prefers-color-scheme: dark)').matches ? 'dark' : 'light';
    const url = `https://guitarapp.com/metronome.html?embed=true&tempo=120&timeSignature=2&pattern=1&theme=${theme}`;
    document.getElementById('metronome-frame').src = url;
  </script>
</body>
</html>
